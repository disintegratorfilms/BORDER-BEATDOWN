    _c({key:'me-shoot',  frames:A.generateFrameNumbers('me_shoot', {start:0,end:24}),frameRate:14,repeat:0});
    _c({key:'me-special',frames:A.generateFrameNumbers('me_special',{start:0,end:24}),frameRate:12,repeat:0});
    _c({key:'me-summon', frames:A.generateFrameNumbers('me_summon',{start:0,end:24}),frameRate:12,repeat:0});
    _c({key:'me-kb',     frames:A.generateFrameNumbers('me_kb',    {start:0,end:24}),frameRate:22,repeat:0}); // F00 immediate stagger
    _c({key:'me-death',  frames:A.generateFrameNumbers('me_death', {start:12,end:24}),frameRate:12,repeat:0}); // F12-F24 falling
    _c({key:'eg-walk',        frames:A.generateFrameNumbers('eg_walk',    {start:0,end:24}),frameRate:10,repeat:-1});
    _c({key:'eg-hustle',      frames:A.generateFrameNumbers('eg_hustle',  {start:0,end:24}),frameRate:16,repeat:-1});
    _c({key:'eg-attack-wind', frames:A.generateFrameNumbers('eg_attack',  {start:0,end:8}), frameRate:36,repeat:0});
    _c({key:'eg-attack-hit',  frames:A.generateFrameNumbers('eg_attack',  {start:9,end:19}),frameRate:16,repeat:0});
    _c({key:'eg-attack-recov',frames:A.generateFrameNumbers('eg_attack',  {start:20,end:24}),frameRate:18,repeat:0});
    _c({key:'eg-knockback',   frames:A.generateFrameNumbers('eg_knockback',{start:0,end:24}),frameRate:18,repeat:0});
    _c({key:'eg-death-fall',  frames:A.generateFrameNumbers('eg_death',   {start:9,end:16}),frameRate:18,repeat:0});
    _c({key:'eg-death-shrink',frames:A.generateFrameNumbers('eg_death',   {start:17,end:24}),frameRate:10,repeat:0});
    if(A.exists('combo-3x')) A.remove('combo-3x');
    if(A.exists('combo-6x')) A.remove('combo-6x');
    A.create({key:'combo-3x',frames:A.generateFrameNumbers('combo3x',{start:0,end:15}),frameRate:20,repeat:0});
    A.create({key:'combo-6x',frames:A.generateFrameNumbers('combo6x',{start:0,end:15}),frameRate:20,repeat:0});

    // El Rayo
    this.hero=this.add.sprite(width*0.15,this.heroMaxY,'lr_idle').setScale(2.2).setDepth(50).setOrigin(0.5,1);
    this.hero.play('lr-idle'); this._groundY=this.hero.y;
    const _onStr=()=>{ if(this._chainingNow) return; this.isAttacking=false; if(this._strBuffered){this._strBuffered=false;this._fireStringStep();}else{this._strStep=0;if(!this.gameOver)this.hero.play('lr-idle',true);} };
    this.hero.on('animationcomplete-lr-attack1',_onStr);
    this.hero.on('animationcomplete-lr-attack2',_onStr);
    this.hero.on('animationcomplete-lr-attack3',()=>{ this.isAttacking=false;this._strStep=0;this._strBuffered=false;if(this._strTimer){this._strTimer.remove();this._strTimer=null;}if(!this.gameOver)this.hero.play('lr-idle',true); });
    this.hero.on('animationcomplete-lr-knockback',()=>{ this.isKnockedBack=false;if(!this.gameOver)this.hero.play('lr-idle',true); });
    this.hero.on('animationcomplete-lr-jump-crouch',()=>{ if(this.isJumping&&!this._jumpKicking)this.hero.play('lr-jump-air',true); });
    this.hero.on('animationcomplete-lr-jump-air',()=>{ if(this.isJumping&&!this._jumpKicking){this.hero.anims.stop();this.hero.setFrame(13);} });
    this.hero.on('animationcomplete-lr-jump-land',()=>{ this._landing=false;if(!this.gameOver)this.hero.play('lr-idle',true); });
    this.hero.on('animationcomplete-lr-jumpkick',()=>{ if(this.isJumping){this._jumpKicking=false;this._land();} });
    this.hero.on('animationcomplete-lr-special-land',()=>{ this.isSpecial=false;this.isAttacking=false;if(!this.gameOver)this.hero.play('lr-idle',true); });

    // Mecha Edgar boss
    this.BOSS_SCALE=2.2;
    this.boss=this.add.sprite(width*0.75,this.heroMaxY,'me_idle').setScale(this.BOSS_SCALE).setDepth(50).setOrigin(0.5,1).setFlipX(true);
    this.boss.play('me-idle');
    this.boss.on('animationcomplete-me-punch',  ()=>{ this._bossAttacking=false;if(!this.bossDefeated)this.boss.play('me-idle',true); });
    this.boss.on('animationcomplete-me-shoot',  ()=>{ this._bossAttacking=false;if(!this.bossDefeated)this.boss.play('me-idle',true); });
    this.boss.on('animationcomplete-me-special',()=>{ this._bossAttacking=false;if(!this.bossDefeated)this.boss.play('me-idle',true); });
    this.boss.on('animationcomplete-me-summon', ()=>{ this._bossAttacking=false;if(!this.bossDefeated)this.boss.play('me-idle',true); });
    this.boss.on('animationcomplete-me-kb',     ()=>{ this._bossKnockedBack=false;if(!this.bossDefeated)this.boss.play('me-idle',true); });
    this.boss.on('animationcomplete-me-death',  ()=>{ this.boss.anims.stop();this.boss.setFrame(24);this.time.delayedCall(1500,()=>this._triggerVictory()); });

    // HUD
    this.add.text(20,14,'EL RAYO',{fontFamily:'"Arial Black"',fontSize:'28px',color:'#ffdd00',stroke:'#000',strokeThickness:5}).setScrollFactor(0).setDepth(1000);
    this.add.text(20,50,'HP',{fontFamily:'Arial',fontSize:'14px',color:'#ff8888'}).setScrollFactor(0).setDepth(1000);
    this.heroHealthBars=[];
    for(let i=0;i<12;i++) this.heroHealthBars.push(this.add.rectangle(54+i*25,57,22,12,0xff3333).setScrollFactor(0).setDepth(1000));
    this.add.text(20,82,'PWR',{fontFamily:'Arial',fontSize:'14px',color:'#ffaa00'}).setScrollFactor(0).setDepth(1000);
    this.heroPowerBars=[];
    for(let i=0;i<10;i++) this.heroPowerBars.push(this.add.rectangle(54+i*25,89,22,12,0x332200).setScrollFactor(0).setDepth(1000));
    this._scoreLabel=this.add.text(width-28,16,'0000000',{fontFamily:'"Arial Black"',fontSize:'52px',color:'#ffee00',stroke:'#ffffff',strokeThickness:6,align:'right',shadow:{offsetX:0,offsetY:0,color:'#ff8800',blur:18,fill:true}}).setOrigin(1,0).setScrollFactor(0).setDepth(5000);
    this._scoreSwelling=false;
    this.add.text(width/2,14,'MECHA EDGAR',{fontFamily:'"Arial Black"',fontSize:'22px',color:'#ff4400',stroke:'#000',strokeThickness:5}).setOrigin(0.5,0).setScrollFactor(0).setDepth(1000);
    this._bossHpBg=this.add.rectangle(width/2,46,600,22,0x330000).setOrigin(0.5,0).setScrollFactor(0).setDepth(1000);
    this._bossHpBar=this.add.rectangle(width/2-300,46,600,22,0xff2200).setOrigin(0,0).setScrollFactor(0).setDepth(1001);
    this.add.rectangle(width/2,46,600,22,0).setStrokeStyle(2,0xff6600).setOrigin(0.5,0).setScrollFactor(0).setDepth(1002);
    this.powerHint=this.add.text(20,height-22,'[G] BODY SLAM — charge up first',{fontFamily:'Arial',fontSize:'18px',color:'#554400'}).setScrollFactor(0).setDepth(1000).setOrigin(0,1);

    // Input
    this.cursors=this.input.keyboard.createCursorKeys();
    this.attackKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.F);
    this.specialKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.G);
    this.jumpKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);
    this.vKey=this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.V);
    this.game.canvas.focus();
    window.initMobileControls(this);

    this._bossActionTimer=null;
    this._introActive=false;
    this.cameras.main.fadeIn(800,0,0,0);
    this._doBossIntro();
    this.events.once('shutdown',()=>{ document.getElementById('bossGameOverOverlay')?.remove(); this.game.canvas.style.pointerEvents=''; });
  }

  _playSfxBoss(key,vol=0.7){
    try{ const s=this.sound.get(key); if(s&&s.isPlaying) return; this.sound.play(key,{volume:vol}); }catch(e){}
  }
  _bossUpdateCombo(){
    this._combo++;
    if(this._comboTimer) this._comboTimer.remove();
    this._comboTimer=this.time.delayedCall(2500,()=>{ this._combo=0; });

    if(this._combo!==3 && this._combo%3!==0) return;

    const is3=(this._combo===3);
    const animKey=is3?'combo-3x':'combo-6x';
    const texKey =is3?'combo3x':'combo6x';
    const scale  =is3?2.5:3.0;
    window._gtrack('combo_hit',{count:this._combo,type:is3?'3x':'6x+',scene:'boss_fight'});

    if(!this.textures.exists(texKey)) return;
    if(!this.anims.exists(animKey)){
      this.anims.create({key:animKey,frames:this.anims.generateFrameNumbers(texKey,{start:0,end:15}),frameRate:20,repeat:0});
    }

    if(this._comboSprite&&this._comboSprite.active){
      this._comboSprite.destroy(); this._comboSprite=null;
    }
    const sx=this.hero.x;
    const sy=this.hero.y-this.hero.displayHeight*0.8;
    const spr=this.add.sprite(sx,sy,texKey)
      .setScale(scale).setDepth(1600).setOrigin(0.5,0.5).setAlpha(1).setScrollFactor(0);
    try{ spr.play(animKey); } catch(err){ spr.destroy(); return; }
    this._comboSprite=spr;
    if(!is3) this.cameras.main.shake(120,0.008);
    spr.once('animationcomplete',()=>{
      if(!spr.active) return;
      this.tweens.add({targets:spr,alpha:0,duration:400,
        onComplete:()=>{ if(spr.active)spr.destroy(); if(this._comboSprite===spr)this._comboSprite=null; }
      });
    });
  }
  _doBossIntro(){
    const {width,height}=this.scale;
    this._introActive=true;
    const title=this.add.text(width/2,height*0.30,'MECHA EDGAR',{fontFamily:'"Arial Black"',fontSize:'100px',color:'#ff4400',stroke:'#000',strokeThickness:12,shadow:{offsetX:0,offsetY:0,color:'#ff8800',blur:40,fill:true}}).setOrigin(0.5).setAlpha(0).setDepth(500).setScrollFactor(0);
    const sub=this.add.text(width/2,height*0.46,'BOSS FIGHT',{fontFamily:'"Arial Black"',fontSize:'42px',color:'#ffdd00',stroke:'#000',strokeThickness:7}).setOrigin(0.5).setAlpha(0).setDepth(500).setScrollFactor(0);
    this.tweens.add({targets:title,alpha:1,duration:400});
    this.tweens.add({targets:sub,alpha:1,duration:400,delay:300});
    this.cameras.main.shake(500,0.015);
    this.time.delayedCall(600,()=>{ this._playSfxBoss('sfx_me_hey_fool',0.85); });
    this.time.delayedCall(2200,()=>{ this.tweens.add({targets:[title,sub],alpha:0,duration:400,onComplete:()=>{ title.destroy();sub.destroy();this._introActive=false;this._scheduleBossAction(); }}); });
  }

  _scheduleBossAction(){
    if(this.gameOver||this.bossDefeated) return;
    const cd=this._bossPhase===1?Phaser.Math.Between(1800,3200):Phaser.Math.Between(900,1800);
    this._bossActionTimer=this.time.delayedCall(cd,()=>this._doBossAction());
  }

  _doBossAction(){
    if(this.gameOver||this.bossDefeated||this._bossAttacking||this._bossKnockedBack) return;
    this.boss.setFlipX(this.hero.x<this.boss.x); // sprites face right — flip when hero is left
    const dist=Math.abs(this.boss.x-this.hero.x);
    const roll=Phaser.Math.Between(1,100);
    let action;
    if(dist<500){ action=roll<45?'punch':roll<65?'shoot':roll<82?'special':'summon'; }
    else         { action=roll<35?'shoot':roll<55?'punch':roll<75?'special':'summon'; }
    if(this._bossPhase===2&&roll>65) action=roll<82?'special':'summon';
    this._bossAttacking=true;
    if(Math.random()<0.25){ this.time.delayedCall(300,()=>this._playSfxBoss('sfx_me_no_cap',0.75)); }
    switch(action){
      case 'punch':   this._bossPunch();   break;
      case 'shoot':   this._bossShoot();   break;
      case 'special': this._bossSpecial(); break;
      case 'summon':  this._bossSummon();  break;
    }
  }

  _bossPunch(){
    this.boss.play('me-punch',true);
    // Damage at F9,F11,F13,F15,F16,F19 @ 16fps
    [9,11,13,15,16,19].forEach(f=>{
      this.time.delayedCall(f/16*1000,()=>{
        if(!this._bossAttacking||this.gameOver) return;
        if(Math.abs(this.boss.x-this.hero.x)<500&&Math.abs(this.boss.y-this.hero.y)<200&&!this.heroInvincible)
          this._damageHero(1);
      });
    });
    this.time.delayedCall(1700,()=>{ this._bossAttacking=false;this._scheduleBossAction(); });
  }

  _bossShoot(){
    this.boss.play('me-shoot',true);
    // Projectile at F12 @ 14fps = 857ms
    this.time.delayedCall(857,()=>{
      if(!this._bossAttacking||this.gameOver) return;
      // Sprites face right. flipX=true means facing left.
      const fireDir=this.boss.flipX?-1:1;
      let px=this.boss.x+fireDir*80;
      const py=this.boss.y-this.boss.displayHeight*0.55;
      const proj=this.add.graphics().setDepth(200);
      const vx=fireDir*620;
      const updateProj=(_,delta)=>{
        px+=vx*(delta/1000); proj.clear();
        proj.fillStyle(0xff4400,0.4); proj.fillCircle(px,py,52);
        proj.fillStyle(0xff8800,0.9); proj.fillCircle(px,py,34);
        proj.fillStyle(0xffdd00,0.8); proj.fillCircle(px,py,18);
        proj.fillStyle(0xffffff,1);   proj.fillCircle(px,py,8);
        const heroCenterY=this.hero.y-this.hero.displayHeight*0.5;
        if(!this.heroInvincible&&Math.abs(px-this.hero.x)<100&&Math.abs(py-heroCenterY)<160){
          this.events.off('update',updateProj); proj.destroy();
          this._damageHero(2); this.cameras.main.shake(200,0.015);
          const fl=this.add.graphics().setDepth(300); fl.fillStyle(0xff6600,0.6); fl.fillCircle(px,py,50);
          this.tweens.add({targets:fl,alpha:0,duration:200,onComplete:()=>fl.destroy()});
        }
        if(px<-200||px>this.scale.width+200){ this.events.off('update',updateProj); proj.destroy(); }
      };
      this.events.on('update',updateProj);
    });
    this.time.delayedCall(1600,()=>{ this._bossAttacking=false;this._scheduleBossAction(); });
  }

  _bossSpecial(){
    this.boss.play('me-special',true);
    this._playSfxBoss('sfx_me_deadass',0.85);
    // Area blast + electricity at F12 @ 12fps = 1000ms
    this.time.delayedCall(1000,()=>{
      if(!this._bossAttacking||this.gameOver) return;
      const {width,height}=this.scale;
      this.cameras.main.shake(700,0.040);
      // Screen electricity
      const elGfx=this.add.graphics().setDepth(600).setScrollFactor(0);
      let elT=0;
      const elUpd=(_,delta)=>{
        elT+=delta; if(elT>1200){ this.events.off('update',elUpd);elGfx.destroy();return; }
        elGfx.clear();
        for(let i=0;i<8;i++){
          const x1=Math.random()*width,y1=Math.random()*height;
          const x2=x1+(Math.random()-0.5)*500,y2=y1+(Math.random()-0.5)*500;
          const mx=x1+(x2-x1)*0.5+(Math.random()-0.5)*120;
          const my=y1+(y2-y1)*0.5+(Math.random()-0.5)*120;
          const a=(1-elT/1200)*0.85;
          elGfx.lineStyle(2+Math.random()*4,i%2===0?0x00aaff:0xffff00,a);
          elGfx.beginPath(); elGfx.moveTo(x1,y1); elGfx.lineTo(mx,my); elGfx.lineTo(x2,y2); elGfx.strokePath();
        }
      };
      this.events.on('update',elUpd);
      // Energy rings
      const bx=this.boss.x, by=this.boss.y-this.boss.displayHeight*0.4;
      const rGfx=this.add.graphics().setDepth(550);
      let rT=0;
      const rUpd=(_,delta)=>{
        rT+=delta; const pt=Math.min(1,rT/600); rGfx.clear();
        rGfx.lineStyle(10*(1-pt)+1,0xff4400,(1-pt)*0.9); rGfx.strokeCircle(bx,by,pt*700);
        rGfx.lineStyle(5*(1-pt)+1, 0x00aaff,(1-pt)*0.7); rGfx.strokeCircle(bx,by,pt*450);
        rGfx.lineStyle(3*(1-pt)+1, 0xffff00,(1-pt)*0.5); rGfx.strokeCircle(bx,by,pt*250);
        if(rT>=700){ this.events.off('update',rUpd);rGfx.destroy(); }
      };
      this.events.on('update',rUpd);
      const fl=this.add.rectangle(width/2,height/2,width,height,0x0044ff,0.25).setScrollFactor(0).setDepth(580);
      this.tweens.add({targets:fl,alpha:0,duration:400,onComplete:()=>fl.destroy()});
      if(!this.heroInvincible&&Math.abs(this.hero.x-this.boss.x)<650) this._damageHero(2);
    });
    this.time.delayedCall(2200,()=>{ this._bossAttacking=false;this._scheduleBossAction(); });
  }

  _bossSummon(){
    this.boss.play('me-summon',true);
    this._playSfxBoss('sfx_me_say_less',0.85);
    this.time.delayedCall(800,()=>{
      if(this.gameOver) return;
      this._showAnnounce('REINFORCEMENTS!','#ff4400');
      const {width,height}=this.scale;
      const spawnFromRight=this.heroFacing<0;
      for(let i=0;i<2;i++){
        this.time.delayedCall(i*220,()=>{
          if(this.gameOver) return;
          const sy=this.hero.y; // spawn at hero's current Y plane
          const sx=spawnFromRight?width+120+i*80:-120-i*80;
          const e=this.add.sprite(sx,sy,'eg_walk').setScale(2.0).setDepth(30).setOrigin(0.5,1);
          e.hp=3; e.maxHp=3; e.dead=false; e.baseScale=2.0; e._dying=false;
          e.attackCooldown=Phaser.Math.Between(1500,2500);
          e.isAttacking=false; e.isKnockedBack=false; e._kbTween=null;
          e.healthBars=[];
          for(let j=0;j<3;j++) e.healthBars.push(this.add.rectangle(0,0,8,4,0xff5500).setDepth(40));
          e.play('eg-walk'); e.setFlipX(spawnFromRight);
          e.on('animationcomplete-eg-attack-wind',()=>{ if(!e.dead&&!e.isKnockedBack)e.play('eg-attack-hit',true);else{e.isAttacking=false;if(!e.dead)e.play('eg-walk',true);} });
          e.on('animationcomplete-eg-attack-hit', ()=>{ if(!e.dead&&!e.isKnockedBack)e.play('eg-attack-recov',true);else{e.isAttacking=false;if(!e.dead)e.play('eg-walk',true);} });
          e.on('animationcomplete-eg-attack-recov',()=>{ e.isAttacking=false;if(!e.dead)e.play('eg-walk',true); });
          e.on('animationcomplete-eg-knockback',()=>{ e.isKnockedBack=false;e.isAttacking=false;if(!e.dead&&!e._dying)e.play('eg-walk',true); });
          this._summonedEdgars.push(e);
        });
      }
    });
    this.time.delayedCall(2000,()=>{ this._bossAttacking=false;this._scheduleBossAction(); });
  }

  _hitBoss(dmg=1){
    if(this.bossDefeated) return; // allow hits during knockback
    this.bossHp=Math.max(0,this.bossHp-dmg);
    const pct=this.bossHp/this.BOSS_MAX_HP;
    this._bossHpBar.width=600*pct;
    this._bossHpBar.setDisplaySize(600*pct,22);
    this._bossHpBar.setFillStyle(pct>0.5?0xff2200:pct>0.25?0xff8800:0xffff00);
    this.boss.setTint(0xffffff); this.time.delayedCall(80,()=>{ if(this.boss.active)this.boss.clearTint(); });
    this.cameras.main.shake(100,0.012);
    window.SCORE=(window.SCORE||0)+200;
    this._scoreLabel.setText(String(window.SCORE).padStart(7,'0'));
    if(this.bossHp<=this.BOSS_MAX_HP/2&&this._bossPhase===1){
      this._bossPhase=2;
      window._gtrack('boss_phase_2',{score:window.SCORE||0});
      this._showAnnounce('PHASE 2!','#ff0000');
      this.cameras.main.shake(600,0.030);
      this.boss.setTint(0xff4400); this.time.delayedCall(500,()=>{ if(this.boss.active)this.boss.clearTint(); });
    }
    if(this.bossHp<=0){ this._killBoss(); return; }
    this._bossKnockedBack=true; this._bossAttacking=false;
    if(this._bossActionTimer){ this._bossActionTimer.remove();this._bossActionTimer=null; }
    this.boss.play('me-kb',true);
    const kbDir=this.hero.x<this.boss.x?1:-1;
    this.tweens.add({targets:this.boss,x:this.boss.x+kbDir*120,duration:200,ease:'Cubic.Out'});
    this.time.delayedCall(800,()=>{ this._bossKnockedBack=false;this._scheduleBossAction(); });
  }

  _killBoss(){
    if(this.bossDefeated) return;
    this.bossDefeated=true; this._bossAttacking=false;
    if(this._bossActionTimer) this._bossActionTimer.remove();
    this.boss.play('me-death',true);
    this.cameras.main.shake(800,0.050);
    for(let i=0;i<8;i++){
      this.time.delayedCall(i*180,()=>{
        if(!this.boss.active) return;
        const ex=this.boss.x+(Math.random()-0.5)*200, ey=this.boss.y-Math.random()*this.boss.displayHeight;
        const fl=this.add.graphics().setDepth(700);
        fl.fillStyle(0xff6600,0.8); fl.fillCircle(ex,ey,60);
        this.tweens.add({targets:fl,alpha:0,scaleX:3,scaleY:3,duration:400,onComplete:()=>fl.destroy()});
      });
    }
  }

  _triggerVictory(){
    const {width,height}=this.scale;
    window._gtrack('boss_defeated',{score:window.SCORE||0});
    this._showAnnounce('K.O.!!','#ffdd00');
    if(this._bossMusic&&this._bossMusic.isPlaying){ this.tweens.add({targets:this._bossMusic,volume:0,duration:1500}); }
    window.SCORE=(window.SCORE||0)+5000;
    this._scoreLabel.setText(String(window.SCORE).padStart(7,'0'));
    this.time.delayedCall(2500,()=>{ this.cameras.main.fadeOut(1000,0,0,0); this.time.delayedCall(1100,()=>this.scene.start('BootScene')); });
  }

  _damageHero(amount=1){
    if(this.heroInvincible||this.gameOver) return;
    this.heroHealth=Math.max(0,this.heroHealth-amount);
    for(let i=this.heroHealthBars.length-1;i>=0&&amount>0;i--){ if(this.heroHealthBars[i].fillColor!==0x333333){this.heroHealthBars[i].setFillStyle(0x333333);amount--;} }
    if(this.heroHealth<=0){ this._triggerHeroDeath(); return; }
    this.isKnockedBack=true; this.isAttacking=false; this.heroInvincible=true;
    this.isSpecial=false; this._landing=false; this._crouching=false;
    this._jumpKicking=false; this._strStep=0; this._strBuffered=false; this._hitFired=false;
    if(this._strTimer){ this._strTimer.remove(); this._strTimer=null; }
    this._playSfxBoss('sfx_rayo_kb',0.8);
    this.hero.play('lr-knockback',true);
    // Hard cap — clear ALL blocking flags after 500ms
    this.time.delayedCall(500,()=>{
      if(this.gameOver) return;
      this.isKnockedBack=false; this.isAttacking=false;
      this.isSpecial=false; this._landing=false; this._crouching=false;
      this._jumpKicking=false; this._strStep=0;
      if(!this.gameOver) this.hero.play('lr-idle',true);
    });
    const kbDir=this.heroFacing*-1;
    this.tweens.add({targets:this.hero,x:Phaser.Math.Clamp(this.hero.x+kbDir*60,this.heroMinX,this.heroMaxX),duration:180,ease:'Sine.Out'});
    this.hero.setTint(0xff3333); this.time.delayedCall(80,()=>{ if(this.hero.active)this.hero.clearTint(); });
    if(this._invincFlash) this._invincFlash.stop();
    this._invincFlash=this.tweens.add({targets:this.hero,alpha:0.3,duration:120,yoyo:true,repeat:-1});
    if(this._invincTimer) this._invincTimer.remove();
    this._invincTimer=this.time.delayedCall(1800,()=>{ this.heroInvincible=false;if(this._invincFlash){this._invincFlash.stop();this._invincFlash=null;}this.hero.setAlpha(1); });
    // Hard cap — clear knockback after 400ms
    this.time.delayedCall(400,()=>{ if(this.isKnockedBack){ this.isKnockedBack=false; if(!this.gameOver) this.hero.play('lr-idle',true); } });
  }

  _triggerHeroDeath(){
    if(this.gameOver) return;
    this.gameOver=true;
    window._gtrack('player_death',{scene:'boss_mecha_edgar',boss_hp:this.bossHp||0,score:window.SCORE||0});
    this.hero.play('lr-knockback',true);
    this.cameras.main.shake(600,0.030);
    this.time.delayedCall(1200,()=>{
      const {width,height}=this.scale;
      this.add.rectangle(width/2,height/2,width,height,0x000000,0.78).setScrollFactor(0).setDepth(2000);
      this.add.text(width/2,height*0.32,'GAME OVER',{fontFamily:'Arial Black',fontSize:'88px',color:'#ff2222',stroke:'#000',strokeThickness:8}).setOrigin(0.5).setScrollFactor(0).setDepth(2001);
      this.game.canvas.style.pointerEvents='none';
      const ov=document.createElement('div'); ov.id='bossGameOverOverlay';
      ov.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;z-index:9999;pointer-events:none';
      const mkBtn=(lbl,bg,cb)=>{ const b=document.createElement('button'); b.textContent=lbl; b.style.cssText=`background:${bg};color:#fff;font-family:Arial Black,sans-serif;font-size:clamp(22px,4vw,42px);font-weight:900;padding:18px 56px;border:4px solid #fff;border-radius:12px;cursor:pointer;pointer-events:auto;touch-action:manipulation;text-shadow:2px 2px 0 #000;min-width:260px;letter-spacing:2px`; b.addEventListener('pointerdown',cb,{passive:false}); return b; };
      const cleanup=()=>{ document.getElementById('bossGameOverOverlay')?.remove();this.game.canvas.style.pointerEvents=''; };
      ov.appendChild(mkBtn('RETRY','#8a1a1a',()=>{ cleanup(); this.game.canvas.focus(); this.scene.restart(); }));
      ov.appendChild(mkBtn('TITLE','#1a1a8a',()=>{ cleanup(); if(this._bossMusic)this._bossMusic.stop(); this.scene.start('BootScene'); }));
      document.body.appendChild(ov);
    });
  }

  _fireStringStep(){
    if(this._strStep>=3) this._strStep=0;
    this._strStep++; this.isAttacking=true; this._strBuffered=false; this._hitFired=false;
    // Lunge 100px forward
    const lungeX=Phaser.Math.Clamp(this.hero.x+this.heroFacing*100,this.heroMinX,this.heroMaxX);
    this.tweens.add({targets:this.hero,x:lungeX,duration:180,ease:'Sine.Out'});
    if(this._strTimer) this._strTimer.remove();
    this._strTimer=this.time.delayedCall(1000,()=>{ this._strStep=0;this._strTimer=null; });
    const animMap={1:'lr-attack1',2:'lr-attack2',3:'lr-attack3'};
    this.hero.play(animMap[this._strStep],true);
    const isFinisher=(this._strStep===3);
    const hitDelay=this._strStep===1?214:this._strStep===2?393:321;
    this.time.delayedCall(hitDelay,()=>{
      if(!this.isAttacking) return;
      this._hitFired=true; this._hitBossThisSwing=false;
      this._summonedEdgars.forEach(e=>e._hitThisSwing=false); // reset per swing
      this._checkBossHit(isFinisher?2:1);
      this._checkEdgarHits(isFinisher?2:1);
    });
    this.time.delayedCall(hitDelay+200,()=>{
      if(this._strBuffered&&this.isAttacking&&this._hitFired){ this._strBuffered=false;this._chainingNow=true;this.hero.anims.stop();this.isAttacking=false;this._fireStringStep();this._chainingNow=false; }
    });
    this.time.delayedCall(950,()=>{ if(this.isAttacking&&this._hitFired)this.isAttacking=false; });
  }

  _checkBossHit(dmg=1){
    if(this._hitBossThisSwing||this.bossDefeated) return; // knockback no longer blocks hits
    const dx=(this.boss.x-this.hero.x)*this.heroFacing, dy=Math.abs(this.boss.y-this.hero.y);
    if(dx>0&&dx<360&&dy<160){ this._hitBossThisSwing=true; this._hitBoss(dmg); this._spawnHitSparks(this.boss.x-this.heroFacing*40,this.boss.y-this.boss.displayHeight*0.5); this._bossUpdateCombo(); }
  }

  _checkEdgarHits(dmg=1){
    this._summonedEdgars.filter(e=>e.active&&!e.dead).forEach(e=>{
      if(e._hitThisSwing) return;
      const dx=(e.x-this.hero.x)*this.heroFacing, dy=Math.abs(e.y-this.hero.y);
      if(dx>0&&dx<360&&dy<140){
        e._hitThisSwing=true; e.hp=Math.max(0,e.hp-dmg);
        let d=dmg; for(let i=e.healthBars.length-1;i>=0&&d>0;i--){ if(e.healthBars[i].fillColor!==0x333333){e.healthBars[i].setFillStyle(0x333333);d--;} }
        e.setTint(0xff8855); this.time.delayedCall(70,()=>{ if(e.active)e.clearTint(); });
        this._spawnHitSparks(e.x,e.y-60);
        this._bossUpdateCombo();
        if(Math.random()<0.4){ this._playSfxBoss('sfx_edgar_hit',0.6); }
        if(e.hp<=0){ this._killSummonedEdgar(e); }
        else {
          e.isKnockedBack=true; e.play('eg-knockback',true);
          if(e._kbTween) e._kbTween.stop();
          e._kbTween=this.tweens.add({targets:e,x:e.x+this.heroFacing*170,duration:200,ease:'Cubic.Out',onComplete:()=>{ e._kbTween=null;e.isKnockedBack=false;e.isAttacking=false;if(!e.dead)e.play('eg-walk',true); }});
        }
      }
    });
  }

  _killSummonedEdgar(e){
    if(e.dead) return;
    e.dead=true; e._dying=true; e.healthBars.forEach(b=>b.destroy());
    window.SCORE=(window.SCORE||0)+300; this._scoreLabel.setText(String(window.SCORE).padStart(7,'0'));
    const dKey=this._lastDeathSfx===0?'sfx_edgar_die1':'sfx_edgar_die2'; this._lastDeathSfx=1-this._lastDeathSfx; this._playSfxBoss(dKey,0.75);
    e.play('eg-death-fall',true);
    this.tweens.add({targets:e,x:e.x+this.heroFacing*400,duration:500,ease:'Quad.Out'});
    e.once('animationcomplete-eg-death-fall',()=>{
      if(!e.active) return;
      e.play('eg-death-shrink',true);
      this.tweens.add({targets:e,scaleX:e.baseScale*1.1,scaleY:e.baseScale*1.1,duration:800});
      e.once('animationcomplete-eg-death-shrink',()=>{ e.anims.stop();e.setFrame(24);e.setDepth(5);this.time.delayedCall(3000,()=>{ if(e.active)this.tweens.add({targets:e,alpha:0,duration:800,onComplete:()=>e.destroy()}); }); });
    });
  }

  _startRunningJumpkickBoss(){
    if(this.isJumping||this.isAttacking||this.isKnockedBack||this.isSpecial||this._crouching||this._landing) return;
    this.isJumping=true; this._jumpKicking=true; this.isAttacking=true;
    this._groundY=this.hero.y; this._jumpVY=-600;
    this._hitBossThisSwing=false;
    this._playSfxBoss('sfx_rayo_kick',0.85);
    this.hero.play('lr-jumpkick',true);
    // Lunge across screen toward boss
    const lungeTarget=Phaser.Math.Clamp(this.hero.x+this.heroFacing*500,this.heroMinX,this.heroMaxX);
    this.tweens.add({targets:this.hero,x:lungeTarget,duration:400,ease:'Sine.Out'});
    // Hit window during lunge
    this.time.delayedCall(200,()=>{
      // Hit boss
      const bdx=(this.boss.x-this.hero.x)*this.heroFacing, bdy=Math.abs(this.boss.y-this.hero.y);
      if(bdx>-80&&bdx<500&&bdy<220&&!this._hitBossThisSwing){
        this._hitBossThisSwing=true; this._hitBoss(2); this._bossUpdateCombo();
        this.cameras.main.shake(200,0.018);
      }
      // Hit summoned edgars
      this._summonedEdgars.forEach(e=>e._hitThisSwing=false);
      this._checkEdgarHits(2);
    });
    // Safety clear
    this.time.delayedCall(1500,()=>{
      if(this.isJumping||this._jumpKicking){
        this.isJumping=false; this._jumpKicking=false; this.isAttacking=false;
        this._jumpVY=0; this._landing=false;
        this.hero.y=this._groundY;
        if(!this.gameOver) this.hero.play('lr-idle',true);
      }
    });
  }
  _startJump(){
    if(this.isJumping||this.isAttacking||this.isKnockedBack||this.isSpecial||this._crouching||this._landing) return;
    this._crouching=true; this.isJumping=true; this._jumpKicking=false; this._groundY=this.hero.y;
    this.hero.play('lr-jump-crouch',true);
    this.time.delayedCall(260,()=>{ this._crouching=false;this._jumpVY=-1100; });
  }
  _land(){
    const wasJK=this._jumpKicking;
    this.isJumping=false;this._jumpKicking=false;this.isAttacking=false;this._jumpVY=0;this.hero.y=this._groundY;
    if(wasJK){ this._landing=true;this.time.delayedCall(200,()=>{ this._landing=false;if(!this.gameOver)this.hero.play('lr-idle',true); }); }
    else { this._landing=true;this.hero.anims.stop();this.hero.play('lr-jump-land');this.time.delayedCall(500,()=>{ if(this._landing){this._landing=false;if(!this.gameOver)this.hero.play('lr-idle',true);} }); }
  }
  _doJumpKick(){
    if(!this.isJumping||this._jumpKicking||this.isAttacking) return;
    this._jumpKicking=true; this.isAttacking=true; this._hitBossThisSwing=false;
    this._playSfxBoss('sfx_rayo_kick',0.8); this.hero.play('lr-jumpkick',true);
    this.time.delayedCall(200,()=>{
      const dx=(this.boss.x-this.hero.x)*this.heroFacing,dy=Math.abs(this.boss.y-this.hero.y);
      if(dx>-80&&dx<400&&dy<220){ this._hitBoss(2); this._bossUpdateCombo(); }
      // Also hit summoned edgars
      this._summonedEdgars.forEach(e=>e._hitThisSwing=false);
      this._checkEdgarHits(2);
    });
  }

  _fireBodySlam(){
    if(this.isSpecial||this.isAttacking||this.isKnockedBack||this.isJumping) return;
    this.isSpecial=true; this.isAttacking=true;
    const {width,height}=this.scale; this._groundY=this.hero.y;
    const slamX=this.boss.x, groundY=this._groundY;
    this.time.delayedCall(4000,()=>{ if(this.isSpecial){this.isSpecial=false;this.isAttacking=false;this.hero.y=groundY;this.hero.setDepth(50);if(!this.gameOver)this.hero.play('lr-idle',true);} });
    this.hero.play('lr-special-windup',true);
    this.tweens.add({targets:this.hero,x:Phaser.Math.Clamp(slamX,this.heroMinX,this.heroMaxX),duration:360,ease:'Sine.InOut'});
    this.time.delayedCall(370,()=>{ if(!this.isSpecial) return; this.hero.setDepth(200);this.tweens.add({targets:this.hero,y:groundY-height*0.28,duration:167,ease:'Sine.Out'}); });
    this.time.delayedCall(540,()=>{
      if(!this.isSpecial) return;
      this.hero.anims.stop(); this.hero.setFrame(12);
      this.time.delayedCall(350,()=>{
        if(!this.isSpecial) return;
        this.tweens.add({targets:this.hero,y:groundY,duration:160,ease:'Cubic.In',onComplete:()=>{
          if(!this.isSpecial) return;
          this.hero.setDepth(50); this.cameras.main.shake(600,0.045);
          window._gtrack('body_slam',{scene:'boss_fight',score:window.SCORE||0});
          this._hitBoss(4); this._spawnHitSparks(slamX,groundY-80);
          this._showAnnounce('BODY SLAM!','#ff8800');
          this.heroPower=0; this._updatePowerBars();
          this.time.delayedCall(60,()=>{ if(!this.isSpecial)return; this.tweens.add({targets:this.hero,y:groundY-50,duration:120,ease:'Sine.Out',onComplete:()=>{ this.tweens.add({targets:this.hero,y:groundY,duration:120,ease:'Sine.In',onComplete:()=>{ if(!this.isSpecial)return;this.hero.play('lr-special-land',true); }}); }}); });
        }});
      });
    });
  }

  _spawnHitSparks(x,y){
    const gfx=this.add.graphics().setDepth(300);
    const sparks=Array.from({length:8},()=>{ const a=Math.random()*Math.PI*2,s=Phaser.Math.Between(80,160); return {vx:Math.cos(a)*s,vy:Math.sin(a)*s-60,x,y}; });
    let el=0;
    const upd=(_,delta)=>{
      el+=delta;const t=el/260;gfx.clear();
      sparks.forEach(s=>{ s.x+=s.vx*(delta/1000);s.y+=s.vy*(delta/1000);s.vy+=320*(delta/1000);const a=(1-t)*0.9;if(a>0){gfx.fillStyle(t<0.4?0xffffff:0xffaa00,a);gfx.fillCircle(s.x,s.y,4*(1-t*0.5));} });
      if(el>=260){ this.events.off('update',upd);gfx.destroy(); }
    };
    this.events.on('update',upd);
  }
  _updatePowerBars(){
    this.heroPowerBars.forEach((b,i)=>b.setFillStyle(i<this.heroPower?0xffaa00:0x332200));
    if(this.heroPower>=10)this.powerHint.setText('[G] BODY SLAM — READY!').setColor('#ffaa00');
    else this.powerHint.setText(`[G] BODY SLAM — ${10-this.heroPower} hit${10-this.heroPower!==1?'s':''} to charge`).setColor('#554400');
  }
  _showAnnounce(msg,color='#ffdd44'){
    const {width,height}=this.scale;
    const t=this.add.text(width/2,height*0.28,msg,{fontFamily:'Arial Black',fontSize:'58px',color,stroke:'#000',strokeThickness:7}).setOrigin(0.5).setScrollFactor(0).setDepth(1500);
    this.tweens.add({targets:t,alpha:0,y:t.y-70,duration:1800,onComplete:()=>t.destroy()});
  }

  _updateBossMovement(delta){
    if(this._bossAttacking||this._bossKnockedBack||this.bossDefeated) return;
    const spd=((this._bossPhase===2?200:140)*delta)/1000;
    const dist=Math.abs(this.boss.x-this.hero.x);
    let moving=false;
    if(dist>600){ this.boss.x+=Math.sign(this.hero.x-this.boss.x)*spd; moving=true; }
    else if(dist<280){ this.boss.x-=Math.sign(this.hero.x-this.boss.x)*spd*0.5; moving=true; }
    this.boss.x=Phaser.Math.Clamp(this.boss.x,100,this.scale.width-100);
    this.boss.setFlipX(this.hero.x<this.boss.x); // face toward hero
    // Play walk or idle
    if(moving){ if(this.boss.anims.currentAnim?.key!=='me-walk') this.boss.play('me-walk',true); }
    else { if(this.boss.anims.currentAnim?.key!=='me-idle') this.boss.play('me-idle',true); }
  }

  _updateSummonedEdgars(delta){
    const move=(280*delta)/1000;
    this._summonedEdgars=this._summonedEdgars.filter(e=>e.active);
    this._summonedEdgars.filter(e=>!e.dead).forEach(e=>{
      if(e.isKnockedBack){ e.healthBars.forEach((b,i)=>{ b.x=e.x-8+i*12;b.y=e.y-e.displayHeight-8; }); return; }
      e.setFlipX(e.x>this.hero.x); e.attackCooldown-=delta;
      const xDist=Math.abs(e.x-this.hero.x);
      if(!e.isAttacking&&xDist>320) e.x+=Math.sign(this.hero.x-e.x)*move;
      const curAnim=e.anims.currentAnim?.key||'';
      if(!e.isAttacking&&!curAnim.startsWith('eg-attack')){ e.play(xDist<500?'eg-hustle':'eg-walk',true); }
      if(!e.isAttacking&&xDist<320&&e.attackCooldown<=0){
        e.isAttacking=true; e.attackCooldown=Phaser.Math.Between(1500,2500);
        e.play('eg-attack-wind',true);
        this.time.delayedCall(260,()=>{ if(!e.dead&&!e.isKnockedBack&&!this.heroInvincible&&xDist<350&&Math.abs(e.y-this.hero.y)<130)this._damageHero(1); });
      }
      e.healthBars.forEach((b,i)=>{ b.x=e.x-8+i*12;b.y=e.y-e.displayHeight-8; });
    });
  }

  update(time,delta){
    if(this.gameOver||this._introActive) return;
    this._updateBossMovement(delta);
    this._updateSummonedEdgars(delta);
    const _L=this.cursors.left.isDown||(window.IS_MOBILE&&window.VPAD.left);
    const _R=this.cursors.right.isDown||(window.IS_MOBILE&&window.VPAD.right);
    const _U=this.cursors.up.isDown||(window.IS_MOBILE&&window.VPAD.up);
    const _D=this.cursors.down.isDown||(window.IS_MOBILE&&window.VPAD.down);
    const _mEvt=window.IS_MOBILE?(window.VPAD_QUEUE[0]||null):null;
    const _atkNow=window.IS_MOBILE?(_mEvt==='attack'||_mEvt==='two_punch'?(window.VPAD_QUEUE.shift(),true):false):Phaser.Input.Keyboard.JustDown(this.attackKey);
    const _specNow=window.IS_MOBILE?(window.VPAD_QUEUE[0]==='power'?(window.VPAD_QUEUE.shift(),true):false):Phaser.Input.Keyboard.JustDown(this.specialKey);
    const _jumpNow=window.IS_MOBILE?(window.VPAD_QUEUE[0]==='jump'?(window.VPAD_QUEUE.shift(),true):false)||Phaser.Input.Keyboard.JustDown(this.jumpKey):Phaser.Input.Keyboard.JustDown(this.jumpKey);
    const _vNow=window.IS_MOBILE?(window.VPAD_QUEUE[0]==='kick'?(window.VPAD_QUEUE.shift(),true):false)||Phaser.Input.Keyboard.JustDown(this.vKey):Phaser.Input.Keyboard.JustDown(this.vKey);
    if(this.isJumping&&this._jumpVY!==0){ this._jumpVY+=1600*(delta/1000);this.hero.y+=this._jumpVY*(delta/1000);if(this.hero.y>=this._groundY){this.hero.y=this._groundY;this._land();} }
    let moving=false;
    if(!this.isAttacking&&!this.isKnockedBack&&!this.isSpecial&&!this._landing){
      const spd=(320*delta)/1000;
      if(_L){this.hero.x-=spd;this.heroFacing=-1;this.hero.setFlipX(true);moving=true;}
      else if(_R){this.hero.x+=spd;this.heroFacing=1;this.hero.setFlipX(false);moving=true;}
      if(!this.isJumping){
        if(_U){this.hero.y-=spd*0.5;moving=true;}
        else if(_D){this.hero.y+=spd*0.5;moving=true;}
        this.hero.y=Phaser.Math.Clamp(this.hero.y,this.heroMinY,this.heroMaxY);
        this._groundY=this.hero.y;
      }
      this.hero.x=Phaser.Math.Clamp(this.hero.x,this.heroMinX,this.heroMaxX);
      if(!this.isJumping){
        if(moving){if(this.hero.anims.currentAnim?.key!=='lr-run')this.hero.play('lr-run',true);}
        else{if(this.hero.anims.currentAnim?.key!=='lr-idle')this.hero.play('lr-idle',true);}
      }
    }
    if(_jumpNow&&!this.isJumping&&!this.isAttacking&&!this.isKnockedBack&&!this.isSpecial&&!this._crouching&&!this._landing)this._startJump();
    if(_vNow&&!this.isJumping&&!this.isAttacking&&!this.isKnockedBack&&!this.isSpecial&&!this._crouching&&!this._landing)this._startRunningJumpkickBoss();
    if(_atkNow&&this.isJumping&&!this._jumpKicking&&!this.isSpecial)this._doJumpKick();
    if(_atkNow&&!this.isJumping&&!this.isKnockedBack&&!this.isSpecial&&!this._landing){
      if(!this.isAttacking)this._fireStringStep();
      else if(this._hitFired)this._strBuffered=true;
    }
    if(_specNow&&this.heroPower>=10&&!this.isAttacking&&!this.isKnockedBack&&!this.isSpecial&&!this.isJumping)this._fireBodySlam();
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: 1920,
  height: 1080,
  pixelArt: true,
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  input: { activePointers: 3, keyboard: true },
  disableContextMenu: true,
  canvasStyle: 'display:block;outline:none;',
  scene: [BootScene, CutsceneScene, ChicosFightScene, ChicosBossScene]
});
</script>
</body>
